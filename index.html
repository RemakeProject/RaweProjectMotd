<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 50px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== НАЗВАНИЕ СЕРВЕРА ===== */
        .server-name {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .separator {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            margin: 15px auto 25px;
            border-radius: 2px;
        }

        /* ===== ОПИСАНИЕ ===== */
        .description {
            font-size: 15px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 30px;
            padding: 0 10px;
        }

        /* ===== ССЫЛКИ ===== */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .link-btn svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .discord {
            background: linear-gradient(135deg, #5865F2, #7289da);
        }

        .telegram {
            background: linear-gradient(135deg, #0088cc, #33b5e5);
        }

        /* ===== КНОПКА ЗАКРЫТЬ ===== */
        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 40px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 1px;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ===== ФУТЕР ===== */
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ========== НАЗВАНИЕ СЕРВЕРА ========== -->
    <div class="server-name">MR UrbanCore</div>
    <div class="separator"></div>

    <!-- ========== ОПИСАНИЕ ========== -->
    <div class="description">
        Добро пожаловать на наш сервер! 🎮<br><br>
        Здесь вас ждёт дружелюбное комьюнити, уникальный контент
        и море веселья. Уважайте других игроков, соблюдайте правила
        и приятной игры!
    </div>

    <!-- ========== ССЫЛКИ ========== -->

        </a>

    </div>

    <!-- ========== КНОПКА ЗАКРЫТЬ ========== -->
    <button class="close-btn" onclick="closeMOTD()">Закрыть</button>

    <div class="footer">Приятной игры! ❤️</div>

</div>

<script>
    function closeMOTD() {
        // Закрытие MOTD в Garry's Mod
        console.log("MOTD closed");
        // Для DarkRP / стандартного MOTD:
        if (typeof gui !== 'undefined') {
            gui.CloseDermaMenus();
        }
    }
</script>

</body>
</html>
